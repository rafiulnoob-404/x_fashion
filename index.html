<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Business AI Assistant</title>
  <style>
    /* ─── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ─── FLOATING BUBBLE ───────────────────────────────── */
    #chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(30, 58, 95, 0.55);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    #chat-bubble:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(30, 58, 95, 0.75);
    }
    #chat-bubble svg { width: 26px; height: 26px; fill: #fff; }

    /* Notification dot */
    #chat-bubble .notif-dot {
      position: absolute;
      top: 3px; right: 3px;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: #f04e4e;
      border: 2px solid #fff;
      animation: notif-pulse 2s infinite;
    }
    @keyframes notif-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(240,78,78,0.55); }
      50%       { box-shadow: 0 0 0 6px rgba(240,78,78,0); }
    }

    /* ─── CHAT WINDOW ───────────────────────────────────── */
    #chat-window {
      position: fixed;
      bottom: 100px;
      right: 28px;
      z-index: 9998;
      width: 390px;
      max-height: 600px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18), 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;

      /* Hidden by default */
      opacity: 0;
      transform: scale(0.88) translateY(24px);
      transform-origin: bottom right;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.34,1.56,0.64,1),
                  transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    #chat-window.open {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: all;
    }

    /* ─── HEADER ────────────────────────────────────────── */
    .chat-header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .header-avatar svg { width: 20px; height: 20px; fill: #fff; }
    .header-text h3 {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .header-text p {
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      display: flex; align-items: center; gap: 5px;
      margin-top: 2px;
    }
    .online-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.3);
    }
    .chat-close-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.12);
      border: none; border-radius: 50%;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      color: #fff; font-size: 17px; line-height: 1;
    }
    .chat-close-btn:hover { background: rgba(255,255,255,0.24); }

    /* ─── MESSAGE AREA ──────────────────────────────────── */
    #message-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f4f7fb;
      scroll-behavior: smooth;
      max-height: 420px;
      /* custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: #c8d6e8 transparent;
    }
    #message-area::-webkit-scrollbar { width: 5px; }
    #message-area::-webkit-scrollbar-track { background: transparent; }
    #message-area::-webkit-scrollbar-thumb { background: #c8d6e8; border-radius: 10px; }

    /* ─── MESSAGES ──────────────────────────────────────── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msg-appear 0.3s ease;
    }
    @keyframes msg-appear {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar-sm {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .msg-avatar-sm svg { width: 14px; height: 14px; fill: #fff; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .bubble.ai {
      background: #fff;
      color: #1e2d40;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .bubble.user {
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble img {
      max-width: 100%;
      border-radius: 10px;
      display: block;
      margin-top: 6px;
    }
    .bubble .img-caption {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 5px;
    }

    /* Typing / Analyzing indicator */
    .typing-bubble {
      background: #fff;
      color: #64748b;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex; align-items: center; gap: 8px;
      animation: msg-appear 0.25s ease;
    }
    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2d6a9f;
      margin: 0 2px;
      animation: dot-bounce 1.3s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* Timestamp */
    .msg-time {
      font-size: 10px;
      color: #94a3b8;
      margin: -6px 6px 0;
      text-align: right;
    }
    .msg-row.user .msg-time { text-align: right; }

    /* ─── INPUT CONTAINER ───────────────────────────────── */
    .chat-input-container {
      padding: 12px 14px;
      background: #fff;
      border-top: 1px solid #e8edf4;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Image preview strip (shown above input when image selected) */
    #img-preview-strip {
      display: none;
      padding: 8px 14px 0;
      background: #fff;
      flex-shrink: 0;
    }
    #img-preview-strip.visible { display: flex; align-items: center; gap: 8px; }
    #img-preview-thumb {
      width: 52px; height: 52px;
      border-radius: 8px;
      object-fit: cover;
      border: 2px solid #2d6a9f;
    }
    #img-preview-name {
      font-size: 12px;
      color: #475569;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #img-remove-btn {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 50%;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #ef4444;
      font-size: 13px;
      transition: background 0.15s;
    }
    #img-remove-btn:hover { background: #fee2e2; }

    /* Text input */
    #text-input {
      flex: 1;
      border: 1.5px solid #dde4ee;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      color: #1e2d40;
      background: #f8fafc;
      outline: none;
      resize: none;
      max-height: 110px;
      min-height: 42px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow-y: auto;
    }
    #text-input:focus {
      border-color: #2d6a9f;
      box-shadow: 0 0 0 3px rgba(45,106,159,0.12);
      background: #fff;
    }
    #text-input::placeholder { color: #94a3b8; }

    /* Icon buttons */
    .icon-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    #attach-btn {
      background: #f1f5f9;
      color: #64748b;
    }
    #attach-btn:hover { background: #e2e8f0; color: #1e3a5f; }
    #attach-btn svg { width: 20px; height: 20px; }

    #send-btn {
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      color: #fff;
      box-shadow: 0 3px 12px rgba(30,58,95,0.35);
    }
    #send-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 5px 18px rgba(30,58,95,0.5);
    }
    #send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    /* Hidden file input */
    #file-input { display: none; }

    /* Error bubble */
    .error-bubble {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      font-size: 13px;
      padding: 9px 13px;
      border-radius: 12px;
      animation: msg-appear 0.25s ease;
    }

    /* ─── RESPONSIVE ────────────────────────────────────── */
    @media (max-width: 440px) {
      #chat-window { width: calc(100vw - 24px); right: 12px; bottom: 90px; }
      #chat-bubble { right: 16px; bottom: 16px; }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════
       FLOATING BUBBLE
  ════════════════════════════════════════════════════ -->
  <button id="chat-bubble" onclick="toggleChat()" aria-label="Open chat">
    <!-- Chat icon (shown when closed) -->
    <svg id="bubble-icon-open" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
    <!-- Close X (shown when open) -->
    <svg id="bubble-icon-close" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
    </svg>
    <span class="notif-dot" id="notif-dot"></span>
  </button>

  <!-- ════════════════════════════════════════════════
       CHAT WINDOW
  ════════════════════════════════════════════════════ -->
  <div id="chat-window" role="dialog" aria-label="Business AI Assistant">

    <!-- Header -->
    <div class="chat-header">
      <div class="header-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      <div class="header-text">
        <h3>Business AI Assistant</h3>
        <p><span class="online-dot"></span> Online · Ready to help</p>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()" aria-label="Close chat">✕</button>
    </div>

    <!-- Image preview strip (appears above input) -->
    <div id="img-preview-strip">
      <img id="img-preview-thumb" src="" alt="preview"/>
      <span id="img-preview-name">image.jpg</span>
      <button id="img-remove-btn" onclick="clearImage()" title="Remove image">✕</button>
    </div>

    <!-- Messages -->
    <div id="message-area">
      <!-- Welcome message -->
      <div class="msg-row ai">
        <div class="msg-avatar-sm">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        </div>
        <div class="bubble ai">
          Hello! 👋 I'm your <strong>Business AI Assistant</strong>.<br/>
          Ask me anything or send an image for analysis.
        </div>
      </div>
    </div>

    <!-- Input container -->
    <div class="chat-input-container">

      <!-- Attachment button -->
      <button class="icon-btn" id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>

      <!-- Hidden file input -->
      <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(event)"/>

      <!-- Text input -->
      <textarea
        id="text-input"
        placeholder="Type a message…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        aria-label="Message input"
      ></textarea>

      <!-- Send button -->
      <button class="icon-btn" id="send-btn" onclick="handleSend()" title="Send" aria-label="Send message">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>

    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       JAVASCRIPT
  ════════════════════════════════════════════════════ -->
  <script>
    /* ── CONFIG ───────────────────────────────────────────
       Replace the URL below with your actual backend URL.
       Example: "https://abc123.ngrok.io/api/web-chat"
    ─────────────────────────────────────────────────── */
    const API_ENDPOINT = "http://YOUR_NGROK_OR_SERVER_URL/api/web-chat";

    /* ── STATE ─────────────────────────────────────────── */
    let isOpen       = false;
    let isBusy       = false;       // Prevent double-sends
    let selectedFile = null;        // Holds the chosen File object
    let selectedB64  = null;        // Holds "data:image/...;base64,..."

    /* ── OPEN / CLOSE ──────────────────────────────────── */
    function toggleChat() {
      isOpen = !isOpen;
      const win  = document.getElementById("chat-window");
      const iconO = document.getElementById("bubble-icon-open");
      const iconC = document.getElementById("bubble-icon-close");
      const dot   = document.getElementById("notif-dot");

      win.classList.toggle("open", isOpen);
      iconO.style.display = isOpen ? "none"  : "block";
      iconC.style.display = isOpen ? "block" : "none";
      dot.style.display   = "none";   // Hide dot once opened

      if (isOpen) {
        scrollToBottom();
        document.getElementById("text-input").focus();
      }
    }

    /* ── HANDLE SEND ───────────────────────────────────── */
    async function handleSend() {
      if (isBusy) return;

      const textEl  = document.getElementById("text-input");
      const userMsg = textEl.value.trim();

      // Nothing to send?
      if (!userMsg && !selectedFile) return;

      isBusy = true;
      setSendDisabled(true);

      if (selectedFile) {
        await sendImageMessage(userMsg);
      } else {
        await sendTextMessage(userMsg);
      }

      textEl.value = "";
      autoResize(textEl);
      isBusy = false;
      setSendDisabled(false);
      textEl.focus();
    }

    /* ── SEND TEXT ─────────────────────────────────────── */
    async function sendTextMessage(text) {
      appendUserBubble(text);
      const typingId = appendTypingIndicator("Typing");

      try {
        const res  = await fetch(API_ENDPOINT, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ type: "text", message: text })
        });

        removeElement(typingId);

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        appendAIBubble(data.reply || "(no reply)");

      } catch (err) {
        removeElement(typingId);
        appendErrorBubble(err.message);
      }
    }

    /* ── SEND IMAGE ────────────────────────────────────── */
    async function sendImageMessage(caption) {
      // Show user bubble with image preview
      appendUserImageBubble(selectedB64, caption);
      clearImage();

      const typingId = appendTypingIndicator("Analyzing image");

      try {
        const res = await fetch(API_ENDPOINT, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ type: "image", image_base64: selectedB64, message: caption || "" })
        });

        removeElement(typingId);

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        appendAIBubble(data.reply || "(no reply)");

      } catch (err) {
        removeElement(typingId);
        appendErrorBubble(err.message);
      }
    }

    /* ── IMAGE SELECT ──────────────────────────────────── */
    function handleImageSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      // Validate: must be image, max 10 MB
      if (!file.type.startsWith("image/")) {
        alert("Please select an image file.");
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        alert("Image must be under 10 MB.");
        return;
      }

      selectedFile = file;

      const reader = new FileReader();
      reader.onload = function(ev) {
        selectedB64 = ev.target.result;   // "data:image/jpeg;base64,..."

        // Show preview strip
        const strip = document.getElementById("img-preview-strip");
        document.getElementById("img-preview-thumb").src  = selectedB64;
        document.getElementById("img-preview-name").textContent = file.name;
        strip.classList.add("visible");

        // Hint the user
        document.getElementById("text-input").placeholder = "Add a caption (optional)…";
        document.getElementById("text-input").focus();
      };
      reader.readAsDataURL(file);

      // Reset file input so the same file can be re-selected
      e.target.value = "";
    }

    function clearImage() {
      selectedFile = null;
      selectedB64  = null;
      document.getElementById("img-preview-strip").classList.remove("visible");
      document.getElementById("img-preview-thumb").src = "";
      document.getElementById("text-input").placeholder = "Type a message…";
    }

    /* ── BUBBLE HELPERS ────────────────────────────────── */
    function appendUserBubble(text) {
      const area = document.getElementById("message-area");
      const row  = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `
        <div>
          <div class="bubble user">${escapeHtml(text)}</div>
          <div class="msg-time">${timeNow()}</div>
        </div>`;
      area.appendChild(row);
      scrollToBottom();
    }

    function appendUserImageBubble(src, caption) {
      const area = document.getElementById("message-area");
      const row  = document.createElement("div");
      row.className = "msg-row user";
      row.innerHTML = `
        <div>
          <div class="bubble user">
            <img src="${src}" alt="uploaded image"/>
            ${caption ? `<div class="img-caption">${escapeHtml(caption)}</div>` : ""}
          </div>
          <div class="msg-time">${timeNow()}</div>
        </div>`;
      area.appendChild(row);
      scrollToBottom();
    }

    function appendAIBubble(text) {
      const area = document.getElementById("message-area");
      const row  = document.createElement("div");
      row.className = "msg-row ai";
      row.innerHTML = `
        <div class="msg-avatar-sm">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        </div>
        <div>
          <div class="bubble ai">${escapeHtml(text)}</div>
          <div class="msg-time">${timeNow()}</div>
        </div>`;
      area.appendChild(row);
      scrollToBottom();
    }

    function appendTypingIndicator(label) {
      const area = document.getElementById("message-area");
      const id   = "typing-" + Date.now();
      const row  = document.createElement("div");
      row.className = "msg-row ai";
      row.id = id;
      row.innerHTML = `
        <div class="msg-avatar-sm">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        </div>
        <div class="typing-bubble">
          <span>${label}</span>
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      area.appendChild(row);
      scrollToBottom();
      return id;
    }

    function appendErrorBubble(msg) {
      const area = document.getElementById("message-area");
      const row  = document.createElement("div");
      row.className = "msg-row ai";
      row.innerHTML = `
        <div class="msg-avatar-sm">
          <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        </div>
        <div class="error-bubble">
          ⚠️ Could not reach the server.<br/>
          <small style="opacity:.75">${escapeHtml(msg)}</small>
        </div>`;
      area.appendChild(row);
      scrollToBottom();
    }

    /* ── UTILITY ───────────────────────────────────────── */
    function scrollToBottom() {
      const area = document.getElementById("message-area");
      area.scrollTop = area.scrollHeight;
    }

    function removeElement(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function setSendDisabled(state) {
      document.getElementById("send-btn").disabled = state;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
        .replace(/\n/g, "<br/>");
    }

    function timeNow() {
      return new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 110) + "px";
    }

    function handleKey(e) {
      // Enter sends, Shift+Enter = newline
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    }

    /* ── SHOW NOTIF DOT AFTER 3s ──────────────────────── */
    setTimeout(() => {
      if (!isOpen) document.getElementById("notif-dot").style.display = "block";
    }, 3000);
  </script>

</body>
</html>
